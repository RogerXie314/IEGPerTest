name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 7
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'
      - name: Restore and Build
        run: dotnet build --configuration Release
      - name: Run tests
        run: |
          dotnet test --no-restore --verbosity minimal

      - name: Run SimulatorRunner (sanity)
        run: dotnet run --project src/SimulatorRunner --configuration Release --no-restore --verbosity minimal
